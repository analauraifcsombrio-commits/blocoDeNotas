<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco de Notas da Laura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Bloco de Notas da Laura</h1>
        <p>Suas anotações são salvas automaticamente no seu navegador.</p>
        
        <textarea id="blocoDeNotas" placeholder="Comece a digitar aqui..."></textarea>
        <div class="actions">
            <button id="saveBtn" type="button">Salvar</button>
            <button id="deleteBtn" type="button">Deletar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
